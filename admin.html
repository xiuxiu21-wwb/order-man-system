<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            opacity: 0.9;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .user-type {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .user-type.elder {
            background: #d1fae5;
            color: #059669;
        }
        
        .user-type.family {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #dc2626;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👥 用户管理后台</h1>
        <p class="subtitle">实时查看注册用户信息</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="elderUsers">0</div>
                <div class="stat-label">老人用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="familyUsers">0</div>
                <div class="stat-label">子女用户</div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadUsers()">🔄 刷新数据</button>
        
        <div id="loading" class="loading">加载中...</div>
        
        <table id="userTable" style="display: none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>手机号</th>
                    <th>用户类型</th>
                    <th>注册时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userList">
            </tbody>
        </table>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000/api';
        
        async function loadUsers() {
            try {
                const response = await fetch(`${API_BASE}/admin/users`);
                const users = await response.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('userTable').style.display = 'table';
                
                const tbody = document.getElementById('userList');
                tbody.innerHTML = '';
                
                let elderCount = 0;
                let familyCount = 0;
                
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    
                    if (user.user_type === 'elder') elderCount++;
                    else if (user.user_type === 'family') familyCount++;
                    
                    tr.innerHTML = `
                        <td>${user.id}</td>
                        <td>${user.name || '-'}</td>
                        <td>${user.phone || '-'}</td>
                        <td><span class="user-type ${user.user_type}">${user.user_type === 'elder' ? '👴 老人' : '👨‍👩‍👧 子女'}</span></td>
                        <td>${new Date(user.created_at).toLocaleString('zh-CN')}</td>
                        <td>
                            <button class="delete-btn" onclick="deleteUser(${user.id})">删除</button>
                        </td>
                    `;
                    
                    tbody.appendChild(tr);
                });
                
                document.getElementById('totalUsers').textContent = users.length;
                document.getElementById('elderUsers').textContent = elderCount;
                document.getElementById('familyUsers').textContent = familyCount;
                
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').textContent = '加载失败，请刷新页面重试';
            }
        }
        
        async function deleteUser(userId) {
            if (!confirm('确定要删除这个用户吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    alert('删除成功');
                    loadUsers();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
        
        // 页面加载时自动加载用户
        loadUsers();
        
        // 每 30 秒自动刷新一次
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
