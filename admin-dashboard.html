<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理后台 - 仪表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #667eea;
            font-size: 32px;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .refresh-btn, .toggle-password-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .toggle-password-btn {
            background: #10b981;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .user-type {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .user-type.elder {
            background: #d1fae5;
            color: #059669;
        }
        
        .user-type.family {
            background: #dbeafe;
            color: #2563eb;
        }
        
        .user-type.admin {
            background: #fef3c7;
            color: #d97706;
        }
        
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .delete-btn:hover {
            background: #dc2626;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .password-cell {
            font-family: 'Courier New', monospace;
            background: #f3f4f6;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
        }
        
        .password-hidden {
            color: #999;
            font-style: italic;
        }
        
        .elder-uid-cell {
            font-family: 'Courier New', monospace;
            background: #fef3c7;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #92400e;
            font-weight: 600;
        }
        
        .bound-elders-cell {
            min-width: 200px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👥 用户管理后台</h1>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
        <p class="subtitle">实时查看注册用户信息</p>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">总用户数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="elderUsers">0</div>
                <div class="stat-label">老人用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="familyUsers">0</div>
                <div class="stat-label">子女用户</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="adminUsers">0</div>
                <div class="stat-label">管理员</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="refresh-btn" onclick="loadUsers()">🔄 刷新数据</button>
            <button class="toggle-password-btn" onclick="togglePassword()" id="toggleBtn">👁️ 显示密码</button>
        </div>
        
        <div id="loading" class="loading">加载中...</div>
        
        <table id="userTable" style="display: none;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>姓名</th>
                    <th>手机号</th>
                    <th>用户名</th>
                    <th>密码</th>
                    <th>老人 UID</th>
                    <th>绑定老人</th>
                    <th>用户类型</th>
                    <th>注册时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="userList">
            </tbody>
        </table>
    </div>
    
    <script>
        const API_BASE = 'http://localhost:8000/api';
        let showPassword = false;
        let usersData = [];
        
        // 检查登录状态
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'admin-login.html';
        }
        
        async function loadUsers() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/admin/users`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.status === 401) {
                    alert('登录已过期，请重新登录');
                    logout();
                    return;
                }
                
                usersData = await response.json();
                renderUsers();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('userTable').style.display = 'table';
                
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('loading').textContent = '加载失败，请刷新页面重试';
            }
        }
        
        function renderUsers() {
            const tbody = document.getElementById('userList');
            tbody.innerHTML = '';
            
            let elderCount = 0;
            let familyCount = 0;
            let adminCount = 0;
            
            usersData.forEach(user => {
                const tr = document.createElement('tr');
                
                if (user.user_type === 'elder') elderCount++;
                else if (user.user_type === 'family') familyCount++;
                else if (user.user_type === 'admin') adminCount++;
                
                const passwordDisplay = showPassword 
                    ? `<span class="password-cell">${user.password_hash || '无'}</span>`
                    : `<span class="password-cell password-hidden">••••••••</span>`;
                
                tr.innerHTML = `
                    <td>${user.id}</td>
                    <td>${user.name || '-'}</td>
                    <td>${user.phone || '-'}</td>
                    <td>${user.username || '-'}</td>
                    <td>${passwordDisplay}</td>
                    <td>${user.elder_uid ? `<span class="elder-uid-cell">${user.elder_uid}</span>` : '<span style="color: #999;">-</span>'}</td>
                    <td>${getBoundEldersDisplay(user)}</td>
                    <td><span class="user-type ${user.user_type}">${getUserTypeText(user.user_type)}</span></td>
                    <td>${new Date(user.created_at).toLocaleString('zh-CN')}</td>
                    <td>
                        <button class="delete-btn" onclick="deleteUser(${user.id})">删除</button>
                    </td>
                `;
                
                tbody.appendChild(tr);
            });
            
            document.getElementById('totalUsers').textContent = usersData.length;
            document.getElementById('elderUsers').textContent = elderCount;
            document.getElementById('familyUsers').textContent = familyCount;
            document.getElementById('adminUsers').textContent = adminCount;
        }
        
        function getUserTypeText(type) {
            const types = {
                'elder': '👴 老人',
                'family': '👨‍👩‍ 子女',
                'admin': '🔑 管理员'
            };
            return types[type] || type;
        }
        
        function getBoundEldersDisplay(user) {
            // 只有子女用户才显示绑定老人信息
            if (user.user_type !== 'family') {
                return '<span style="color: #999;">-</span>';
            }
            
            // 检查是否有绑定的老人
            if (!user.bound_elders || user.bound_elders.length === 0) {
                return '<span style="color: #999; font-style: italic;">未绑定</span>';
            }
            
            // 显示绑定的老人列表
            const eldersHtml = user.bound_elders.map(elder => {
                const relationText = elder.relation || '未知';
                return `
                    <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 3px;">
                        <span style="background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 4px; font-size: 12px;">👤 ${elder.elder_name}</span>
                        <span style="color: #999; font-size: 11px;">(${relationText})</span>
                    </div>
                    <div style="margin-left: 10px; font-size: 11px; color: #666; font-family: monospace; background: #fef3c7; padding: 2px 6px; border-radius: 3px; display: inline-block;">
                        ${elder.elder_uid}
                    </div>
                `;
            }).join('');
            
            return `<div style="display: flex; flex-direction: column; gap: 4px;">${eldersHtml}</div>`;
        }
        
        function togglePassword() {
            showPassword = !showPassword;
            document.getElementById('toggleBtn').textContent = showPassword ? '🙈 隐藏密码' : '👁️ 显示密码';
            renderUsers();
        }
        
        async function deleteUser(userId) {
            if (!confirm('确定要删除这个用户吗？')) return;
            
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`${API_BASE}/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    alert('删除成功');
                    loadUsers();
                } else {
                    alert('删除失败');
                }
            } catch (error) {
                alert('删除失败：' + error.message);
            }
        }
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('token');
            window.location.href = 'admin-login.html';
        }
        
        // 页面加载时自动加载用户
        loadUsers();
        
        // 每 30 秒自动刷新一次
        setInterval(loadUsers, 30000);
    </script>
</body>
</html>
